<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cookie Clicker</title>
        <link rel="stylesheet" href="../css/font.css">
        <link rel="icon" href="../img/favicon.png" type="image/png">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-color:rgb(94, 35, 35);
                color:white;
                width:100vw;
                height:100vh;
            }

            div.top {
                display: flex;
                width:100vw;
                align-items: center;
                justify-content: center;
                flex-direction: column;
            }

            div.top > img {
                transition:0.15s;
                /* border-radius:1000px; */
            }

            div.top > img:hover {
                transform: scale(1.05);
                cursor:pointer;
            }

            div.rewards {
                margin:5vh 0;
                display:flex;
                flex-direction: column;
                width:100vw;
                align-items: center;
                justify-content: center;
            }
            div.rewards > div {
                color:rgb(255, 255, 255);
                background-color:rgb(9, 16, 104);
                border-radius: 7px;
                padding:5px;
                width:30vw;
                display:none;
                align-items:center;
                justify-content: space-between;
                margin-bottom:3vh;
            }

            #boom {
                /* display:none; */
                display:flex;
                position:absolute;
                left:30%;
                bottom:50%;
                transition:0.3s;
            }

            #boom:hover {
                transform: scale(1.1);
                cursor:pointer;
            }

            .h {
                position:absolute;
                right:20%;
                bottom:10%;
                display:flex;
                align-items: center;
                justify-content: center;
                color:black;
                display:none;
                animation-name:forH;
                animation-iteration-count: infinite;
                animation-duration: 4s;
                background-color:rgba(210, 105, 30, 0.596);
                padding:10px;
                border-radius:10px;
            }

            @keyframes forH {
                0% {
                    color:red;
                }

                25% {
                    color:yellow;
                }

                50% {
                    color:rgb(1, 12, 107);
                }

                100% {
                    color:black;
                }
            }

            .video {
                display:none;
                /* display:flex; */
            }

            #rickroll {
                position:absolute;
                left:0%;
                bottom:0%;
            }
        </style>
    </head>
    <body id="body">
        <div class="top">
            <img id="toClick" width="200px" height="200px"
                src="../img/cookie.png"
                alt="Cookie">
            <h3 id="infoGive">You have total 0 cookies!</h3>
        </div>

        <div class="rewards">
            <div id="coin1">
                <img style="border-radius:10px;" width="50px" height="50px"
                    src="../img/at-twenty.jpg"
                    alt="no-img">
                <h4>Your now get 5+ cookies every click!</h4>
            </div>

            <div id="coin2" style="background-color: rgb(119, 78, 1);">
                <img style="border-radius:10px;" width="50px" height="50px"
                    src="../img/at-twenty.jpg"
                    alt="no-img">
                <h4>Your now get 10+ cookies every click!</h4>
            </div>
        </div>

        <div style="display:none;" id="boom">
            <img width="50px" height="50px" src="../img/favicon.png"
                alt="Booom">
        </div>

        <div id="h" class="h">
            <h1>You Have 10 seconds to make as more cookies as you can!</h1>
        </div>

        <div style="display:none;" class="music">
            <audio id="ding" src="../sound/ding.mp3"></audio>
            <audio id="bg" src="../sound/bg.mp3"></audio>
        </div>

        <div id="video" class="video">
            <iframe
                id="rickroll"
                src=""
                title="YouTube video player"
                frameborder="0"
                allow="autoplay; encrypted-media"
                allowfullscreen>
            </iframe>
        </div>

        <script src="js/cookie.js"></script>
    </body>
</html>
