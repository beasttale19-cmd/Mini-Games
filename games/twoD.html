<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Two D</title>
        <link rel="stylesheet" href="../css/font.css">
        <link rel="icon" href="../assets/log.png" type="image/png">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-image: url('../assets/bg.jpg');
                background-size:cover;
                background-position:bottom center;
                overflow:hidden;
                width:100vw;
                height:100vh;
            }

            .container {
                position:absolute;
                bottom:0%;
            }

            .box {
                width:100vw;
                height:30vh;
                background-color:rgb(1, 73, 1);
                border:2px solid black;
                border-left:none;
                border-right:none;
                box-shadow:inset 0px 0px 50px 10px green;
            }

            #player > *{
                width:300px;
                image-rendering: pixelated;
                image-rendering: crisp-edges;
                display:block;
                /* position:absolute; */
            }

            .none {
                display:none !important;
            }

            .banner {
                position:absolute;
                display:flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                width:100vw;
                height:100vh;
                animation-name:banner;
                animation-iteration-count: infinite;
                animation-duration: 4s;
                animation-timing-function: ease-in-out;
            }

            .banner img {
                width:50vw;
            }

            .banner h2 {
                background-color:black;
                padding:5px;
                color:white;
                font-family: "Press Start 2P", sans-serif;
            }

            @keyframes banner {
                0% {
                    transform: translateX(0);
                    /* opacity:0.8; */
                }

                25% {
                    transform: translateX(-40px);
                    /* opacity:1; */
                }

                50% {
                    transform:translateX(0);
                    /* opacity:0.8; */
                }

                75% {
                    transform:translateX(40px);
                    /* opacity:1; */
                }

                100% {
                    transform:translateX(0);
                    /* opacity:0.8; */
                }
            }

            .info {
                position:absolute;
                top:0%;
                right:0%;
                color:white;
                background-color:black;
                padding:5px;
                font-family: "Press Start 2P", sans-serif;
            }

            .character {
                display:flex;
            }
            #enemy > * {
                width:300px;
                image-rendering: pixelated;
                image-rendering: crisp-edges;
                display:block;
                position:absolute;
            }

            @keyframes hurt {
                0% {
                    box-shadow:inset 0px 0px 1000px 10px red;
                }

                25% {
                    box-shadow:none;
                }

                50% {
                    box-shadow:inset 0px 0px 1000px 10px red;
                }

                75% {
                    box-shadow: none;
                }

                100% {
                    box-shadow:inset 0px 0px 1000px 10px red;
                }
            }

            .hurt {
                animation-name: hurt;
                animation-duration:2s;
                animation-iteration-count: infinite;
            }

            .sound{
                display:none;
            }
        </style>
    </head>
    <body id="body">
        <div class="container">
            <div class="character">
                <div id="player">
                    <img id="idle"
                        src="../assets/Outline/120x80_gifs/__Idle.gif"
                        alt="player">
                    <img id="right" class="none"
                        src="../assets/Outline/120x80_gifs/__Run.gif"
                        alt="player">
                    <img id="jump" class="none"
                        src="../assets/Outline/120x80_gifs/__Jump.gif"
                        alt="player">
                    <img id="left" class="none"
                        src="../assets/Outline/120x80_gifs/left-run.gif"
                        alt="player">
                </div>
                <div id="enemy">
                    <img id="enemyIdle" src="../assets/NoOutline/120x80_gifs/__Idle.gif"
                        alt="enemy">

                    <img id="enemyAttack" class="none" src="../assets/NoOutline/120x80_gifs/__Attack.gif"
                        alt="enemy">
                </div>
            </div>
            <div class="box"></div>
        </div>

        <div class="info">
            <h3>W - Jump!</h3>
            <h3>-> - Move Right!</h3>
            <h3><- - Move Left!</h3>
        </div>

        <div class="sound">
            <audio id="hurt" src="../sound/classic_hurt.mp3"></audio>
            <audio id="bg" src="../sound/bg-ele.mp3" autoplay loop></audio>
        </div>

        <div id="banner" class="banner">
            <img src="../assets/banner.png" alt>
            <h2>Press any key to Start!</h2>
        </div>

        <script src="js/game.js"></script>
    </body>
</html>
