<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Two D</title>
        <link rel="stylesheet" href="../css/font.css">
        <link rel="icon" href="../assets/log.png" type="image/png">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background-image: url('../assets/bg.jpg');
                background-size:cover;
                background-position:bottom center;
                overflow:hidden;
                width:100vw;
                height:100vh;
            }

            .container {
                position:absolute;
                bottom:0%;
            }

            .box {
                width:100vw;
                height:25vh;
                background-color:rgb(1, 73, 1);
                border:2px solid black;
                border-left:none;
                border-right:none;
                box-shadow:inset 0px 0px 50px 10px green;
            }

            #player > *{
                width:300px;
                image-rendering: pixelated;
                image-rendering: crisp-edges;
                display:block;
            }

            .none {
                display:none !important;
            }

            .player {
                position:absolute;
            } 

            .banner {
                position:absolute;
                display:flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                width:100vw;
                height:100vh;
                animation-name:banner;
                animation-iteration-count: infinite;
                animation-duration: 5s;
            }

            .banner img {
                width:50vw;
            }

            .banner h2 {
                -webkit-text-stroke: 1px black;
                color:white;
                font-family: "Press Start 2P", sans-serif;
            }

            @keyframes banner {
                0% {
                    transform: translateY(-40px);
                }

                50% {
                    transform: translateY(+40px);
                }

                75% {
                    transform:translateY(-40px);
                }

                100% {
                    transform:translateY(40px);
                }
            }
        </style>
    </head>
    <body id="body">
        <div class="container">
            <div id="player">
                <img id="idle" src="../assets/Outline/120x80_gifs/__Idle.gif" alt="player">
                <img id="right" class="none" src="../assets/Outline/120x80_gifs/__Run.gif" alt="player">
                <img id="jump" class="none" src="../assets/Outline/120x80_gifs/__Jump.gif" alt="player">
                <img id="left" class="none" src="../assets/Outline/120x80_gifs/left-run.gif" alt="player">
            </div>
            <div class="box"></div>
        </div>

        <div class="banner">
            <img src="../assets/banner.png" alt="">
            <h2>Press any key to Start!</h2>
        </div>

        <script src="js/game.js"></script>
    </body>
</html>
