<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="../css/font.css">
    <link rel="icon" href="../img/favicon.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display:flex;
            align-items: center;
            justify-content: center;
            width:100vw;
            height:100vh;
            background-color:rgb(0, 255, 242);
        }

        .container {
            display:flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            width:80vw;
            height:80vh;
        }

        .container > div {
            display:flex;
        }

        .container button {
            display: flex;
            align-items: center;
            justify-content: center;
            width:100px;
            height:100px;
            font-size:2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row1">
            <button onclick="press(1)"></button>
            <button onclick="press(2)"></button>
            <button onclick="press(3)"></button>
        </div>
        <div class="row2">
            <button onclick="press(4)"></button>
            <button onclick="press(5)"></button>
            <button onclick="press(6)"></button>
        </div>
        <div class="row3">
            <button onclick="press(7)"></button>
            <button onclick="press(8)"></button>
            <button onclick="press(9)"></button>
        </div>
    </div>

    <script src="js/tic.js"></script>
</body>
</html>
