<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="../css/font.css">
    <link rel="icon" href="../img/favicon.png" type="image/png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display:flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            width:100vw;
            height:100vh;
            background-color:rgb(0, 255, 242);
        }

        .container {
            display:flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            width:80vw;
            height:80vh;
        }

        .container > div {
            display:flex;
        }

        .container button {
            display: flex;
            align-items: center;
            justify-content: center;
            width:100px;
            height:100px;
            font-size:2em;
        }


    </style>
</head>
<body>
    <h1>TIC TAC TOE</h1>
    <div class="container">
        <div class="row1">
            <button id="1" onclick="press(1)"></button>
            <button id="2" onclick="press(2)"></button>
            <button id="3" onclick="press(3)"></button>
        </div>
        <div class="row2">
            <button id="4" onclick="press(4)"></button>
            <button id="5" onclick="press(5)"></button>
            <button id="6" onclick="press(6)"></button>
        </div>
        <div class="row3">
            <button id="7" onclick="press(7)"></button>
            <button id="8" onclick="press(8)"></button>
            <button id="9" onclick="press(9)"></button>
        </div>
        <h3 id="error">ERRORS:</h3>
        <h3 id="turn">Turn: X</h3>
    </div>


    <div class="media">
        <audio id="victory" src="../sound/victory.mp3"></audio>
        <audio id="correct" src="../sound/bone-crack.mp3"></audio>
        <audio id="errorM" src="../sound/error.mp3"></audio>
        <audio id="faah" src="../sound/faah.mp3"></audio>
    </div>

    <script src="js/tic.js"></script>
</body>
</html>
