<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rock Paper Scissors</title>
        <link rel="stylesheet" href="../css/font.css">
        <link rel="icon" href="../img/favicon.png" type="image/png">
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color:rgb(233, 241, 217);
            scrollbar-width: none;
            -ms-overflow-style: none;
            overflow-x:hidden;
        }

        .choose {
            /* display:none; */
            display:flex;
            align-items: center;
            justify-content: center;
            width:100vw;
            height:100vh;
            gap:34px;
        }

        .choose > button {
            /* border: none; */
            /* background-color: inherit; */
            transition:0.3s;
            perspective: 1000px;
        }

        .choose > button:hover {
            cursor:pointer;
        }

        .bot-choose {
            /* display:flex; */
            display:none;
            flex-direction: column;
            width:100vw;
            height:100vh;
            align-items: center;
            justify-content: center;
        }

        .bot-choose img {
            /* display:flex; */
            display:none;
        }

        .tryagain{
            background-color:blue;
            color:white;
            transition:0.3s;
            display:flex;
            padding:5px;
            border-radius:7px;
        }

        .tryagain:hover{
            transform:scale(1.1);
        }

        .head {
            display:flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position:absolute;
            top:0%;
        }
    </style>
    </head>
    <body>
        <div id="choose" class="choose">
            <div class="head">
                <h1>ROCK -- PAPER -- SCISSORS</h1>
                <h3>Choose One!</h3>
            </div>

            <button id="rock">
                <img width="300px" height="300px" src="../img/rock.png"
                    alt="no-img">
                <h3>ROCK</h3>
            </button>

            <button id="paper">
                <img width="300px" height="300px" src="../img/paper.png"
                    alt="no-img">
                <h3>PAPER</h3>
            </button>

            <button id="scissor">
                <img width="300px" height="300px" src="../img/scissor.png"
                    alt="no-img">
                <h3>SCISSORS</h3>
            </button>
        </div>

        <div id="botChoose" class="bot-choose">
            <h1>Bot Chooses:</h1>

            <div class="c">
                <img id="bot-rock" width="300px" height="300px"
                    src="../img/rock.png"
                    alt="no-img">
                <img id="bot-paper" width="300px" height="300px"
                    src="../img/paper.png"
                    alt="no-img">
                <img id="bot-scissor" width="300px" height="300px"
                    src="../img/scissor.png"
                    alt="no-img">

            </div>

            <h2 id="result">Result:</h2>
            <a href="rps.html" class="tryagain">Try Again!</a>
        </div>

        <script src="js/rps.js"></script>
    </body>
</html>
